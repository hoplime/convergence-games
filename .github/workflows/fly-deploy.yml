# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.dev.toml --app convergence-games-dev --build-secret npmrc="${NPMRC}" --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) --label sha=${GITHUB_SHA::7} --label repo=${{ github.repository }} --label run=${{ github.run_id }} --label branch=${{ github.ref_name }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          NPMRC: ${{ secrets.NPMRC }}
